<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSD TERMINAL MONITORING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --terminal-bg: #0a0e14; --panel-bg: #111827; --accent-blue: #38bdf8; --border-color: #1e293b; }
        body { background-color: var(--terminal-bg); color: #f1f5f9; font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
        .glass-panel { background: var(--panel-bg); border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
        .trend-up { color: #22c55e; font-size: 10px; font-weight: bold; }
        .trend-down { color: #ef4444; font-size: 10px; font-weight: bold; }
        .input-dark { background: #020617; border: 1px solid #334155; color: white; padding: 4px 8px; border-radius: 4px; font-size: 13px; outline: none; }
        .news-item { border-left: 2px solid #334155; padding-left: 10px; margin-bottom: 8px; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4 mb-4 border-b border-slate-800 pb-4">
        <div class="flex items-center gap-6">
            <h1 class="header-font text-xl font-black text-white uppercase">CRUDE OIL<span class="text-cyan-500">MONITORING</span></h1>
            <div class="border-l border-slate-700 pl-4">
                <span id="current-time" class="mono text-cyan-400 text-lg font-bold">00:00:00</span>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 w-full">
            <div class="glass-panel p-2 rounded text-center"><p class="text-[8px] text-cyan-400 font-bold uppercase">WTI</p><span id="live-wti" class="mono text-blue-400 font-bold text-sm">--.--</span></div>
            <div class="glass-panel p-2 rounded text-center"><p class="text-[8px] text-cyan-400 font-bold uppercase">BRENT</p><span id="live-brent" class="mono text-orange-400 font-bold text-sm">--.--</span></div>
            <div class="glass-panel p-2 rounded text-center"><p class="text-[8px] text-cyan-400 font-bold uppercase">GAS</p><span id="live-gas" class="mono text-yellow-400 font-bold text-sm">--.--</span></div>
            <div class="glass-panel p-2 rounded text-center"><p class="text-[8px] text-cyan-400 font-bold uppercase">MURBAN</p><span id="live-murban" class="mono text-emerald-400 font-bold text-sm">--.--</span></div>
            <div class="glass-panel p-2 rounded text-center"><p class="text-[8px] text-cyan-400 font-bold uppercase">DXY</p><span id="live-dxy" class="mono text-purple-400 font-bold text-sm">--.--</span></div>
            <div class="glass-panel p-2 rounded text-center border-r-2 border-r-cyan-600">
                <p class="text-[8px] text-cyan-400 font-bold uppercase">USD/IDR</p>
                <div class="flex justify-center items-center gap-1">
                    <span id="kurs-top" class="mono text-white font-bold text-sm">--.---</span>
                    <span id="trend-kurs" class="text-[8px]"></span>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-9 space-y-6">
            <div class="glass-panel p-4 rounded-lg border-t-2 border-cyan-500">
                <div class="flex flex-wrap items-end gap-6">
                    <div class="flex-1 min-w-[180px]">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Market Link / Base ($/BBL)</label>
                        <input type="number" id="input-mops" value="139.02" class="input-dark w-full font-bold text-lg mono text-cyan-400">
                    </div>
                    <div class="flex-1 text-right border-l border-slate-800 pl-6" id="final-price-container">
                        <p class="text-[9px] text-slate-500 uppercase font-black">Franco Quote (Rp/Ltr)</p>
                        <div id="final-price" class="text-3xl font-black text-white mono">Rp 0</div>
                    </div>
                </div>
            </div>
            
            </div>

        <div class="lg:col-span-3 space-y-4">
             <div class="glass-panel p-4 rounded-lg bg-gradient-to-br from-slate-900 to-slate-950">
                <h4 class="text-[10px] font-bold text-slate-500 uppercase mb-4">System Status</h4>
                <div class="space-y-2 text-[10px]">
                    <div class="flex justify-between"><span>Firebase</span><span class="text-green-500">●</span></div>
                    <div class="flex justify-between"><span>OilPrice API</span><span class="text-amber-500">●</span></div>
                    <div class="flex justify-between"><span>Exchange Rate</span><span class="text-cyan-500">●</span></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        let lastKursIdr = 0;
        window.marketData = { mops: 139.02, brent: 90.82, wti: 88.96, gas: 1.78, murban: 91.45, dxy: 103.85 };

        async function fetchIDR() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const newKurs = data.rates.IDR;
                
                // Logika Indikator Naik/Turun
                const trendEl = document.getElementById('trend-kurs');
                if (lastKursIdr !== 0) {
                    if (newKurs > lastKursIdr) {
                        trendEl.innerHTML = '<span class="text-red-500">▼</span>'; // Turun (IDR melemah terhadap USD)
                    } else if (newKurs < lastKursIdr) {
                        trendEl.innerHTML = '<span class="text-green-500">▲</span>'; // Naik (IDR menguat)
                    }
                }
                
                lastKursIdr = newKurs;
                document.getElementById('kurs-top').innerText = Math.round(newKurs).toLocaleString('id-ID');
            } catch (e) { console.error("API Error"); }
        }

        function runLive() {
            setInterval(() => {
                document.getElementById('current-time').innerText = new Date().toLocaleTimeString('en-GB');
                
                // Update header values
                ['wti', 'brent', 'gas', 'murban', 'dxy'].forEach(key => {
                    const change = (Math.random() - 0.5) * 0.15;
                    window.marketData[key] = parseFloat((window.marketData[key] + change).toFixed(2));
                    const el = document.getElementById(`live-${key}`);
                    if(el) el.innerText = window.marketData[key];
                });
            }, 3000);
        }

        fetchIDR(); runLive();
        setInterval(fetchIDR, 60000); // Kurs update setiap menit
    </script>
</body>
</html>
