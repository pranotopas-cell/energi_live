<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSE Energy Market Terminal</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.market{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.label{
color:#94a3b8;
font-size:14px;
}

.value{
font-size:26px;
font-weight:bold;
margin-top:5px;
}

.section{
margin-top:40px;
}

.calc{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border-radius:5px;
border:none;
}

button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.result{
font-size:24px;
text-align:center;
margin-top:15px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:30px;
color:#94a3b8;
}

</style>
</head>

<body>

<h1>KSE ENERGY MARKET TERMINAL</h1>

<div class="market">

<div class="card">
<div class="label">WTI</div>
<input id="wti" value="86">
</div>

<div class="card">
<div class="label">BRENT</div>
<input id="brent" value="89">
</div>

<div class="card">
<div class="label">MURBAN</div>
<input id="murban" value="90">
</div>

<div class="card">
<div class="label">SGX GASOIL</div>
<input id="gasoil" value="812">
</div>

<div class="card">
<div class="label">USD / IDR</div>
<input id="usd" value="16900">
</div>

<div class="card">
<div class="label">DXY</div>
<input id="dxy" value="104">
</div>

</div>

<div class="section">

<div class="calc">

<h2>Estimasi MOPS</h2>

<label>Differential (20-35)</label>
<input id="diff" value="25">

<button onclick="hitungMops()">Hitung MOPS</button>

<div class="result" id="mops">--</div>

</div>

</div>

<div class="section">

<div class="calc">

<h2>Kalkulator Solar Industri</h2>

<label>PPN (%)</label>
<input id="ppn" value="11">

<label>PBBKB (%)</label>
<input id="pbbkb" value="5">

<label>PPh (%)</label>
<input id="pph" value="0.3">

<button onclick="hitungSolar()">Hitung Harga</button>

<div class="result" id="solar">Rp -</div>

</div>

</div>

<div class="footer">
KSE Energy Monitoring System
</div>

<script>

function hitungMops(){

let gasoil=parseFloat(document.getElementById("gasoil").value)
let diff=parseFloat(document.getElementById("diff").value)

let mops=gasoil-diff

document.getElementById("mops").innerText=mops.toFixed(2)+" USD/BBL"

window.mopsValue=mops

}

function hitungSolar(){

let mops=window.mopsValue || 780
let kurs=parseFloat(document.getElementById("usd").value)

let ppn=document.getElementById("ppn").value/100
let pbbkb=document.getElementById("pbbkb").value/100
let pph=document.getElementById("pph").value/100

let liter=(mops*kurs)/159

let harga=liter+(liter*ppn)+(liter*pbbkb)+(liter*pph)

document.getElementById("solar").innerText="Rp "+Math.round(harga)+"/L"

}

</script>

</body>
</html>
