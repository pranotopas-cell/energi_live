<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSD TERMINAL MONITORING - MARKETSTACK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0e14; --panel: #111827; --accent: #38bdf8; }
        body { background-color: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: var(--panel); border: 1px solid #1e293b; border-radius: 8px; }
        .input-dark { background: #020617; border: 1px solid #334155; color: white; padding: 6px 10px; border-radius: 4px; outline: none; }
        .trend-up { color: #22c55e; }
        .trend-down { color: #ef4444; }
    </style>
</head>
<body class="p-4">

    <header class="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4 mb-6 border-b border-slate-800 pb-4">
        <div>
            <h1 class="header-font text-2xl font-black text-white uppercase tracking-tighter">
                OIL MARKET<span class="text-cyan-500"> STACK</span>
            </h1>
            <p class="text-[9px] text-slate-500 tracking-[0.2em] font-bold">PT KHATULISTIWA SINAR ENERGI - MONITORING SYSTEM</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 w-full lg:w-auto">
            <div class="glass-panel p-3 min-w-[140px]">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Brent Crude</p>
                <div class="flex justify-between items-baseline">
                    <span id="live-brent" class="mono text-orange-400 font-bold text-xl">--.--</span>
                    <span class="text-[10px] text-slate-600">USD</span>
                </div>
            </div>
            <div class="glass-panel p-3 min-w-[140px]">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">WTI Crude</p>
                <div class="flex justify-between items-baseline">
                    <span id="live-wti" class="mono text-blue-400 font-bold text-xl">--.--</span>
                    <span class="text-[10px] text-slate-600">USD</span>
                </div>
            </div>
            <div class="glass-panel p-3 min-w-[140px]">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Kurs USD/IDR</p>
                <div class="flex justify-between items-baseline">
                    <span id="kurs-top" class="mono text-white font-bold text-xl">--.---</span>
                </div>
            </div>
            <div class="glass-panel p-3 border-r-2 border-r-cyan-500">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Last Sync</p>
                <div id="current-time" class="mono text-cyan-400 font-bold text-lg leading-none mt-1">00:00:00</div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="glass-panel p-6 border-t-2 border-cyan-500 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                
                <div class="md:col-span-4">
                    <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Market Reference & Base Price</label>
                    <div class="flex gap-2">
                        <select id="market-sync" onchange="syncFromMarket()" class="input-dark bg-slate-800 text-xs font-bold">
                            <option value="brent">Brent Oil</option>
                            <option value="wti">WTI Oil</option>
                            <option value="manual">Manual Input</option>
                        </select>
                        <input type="number" id="input-mops" value="80.00" step="0.01" oninput="calculateSolar()" class="input-dark flex-1 font-bold text-xl mono text-cyan-400">
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Alpha Premium</label>
                    <select id="input-alpha" onchange="calculateSolar()" class="input-dark w-full font-bold text-xl mono text-green-500 bg-slate-900">
                        <option value="2.0">2.0</option>
                        <option value="2.5">2.5</option>
                        <option value="3.0">3.0</option>
                        <option value="3.5">3.5</option>
                        <option value="4.0">4.0</option>
                        <option value="4.5" selected>4.5</option>
                        <option value="5.0">5.0</option>
                        <option value="5.5">5.5</option>
                        <option value="6.0">6.0</option>
                        <option value="6.5">6.5</option>
                        <option value="7.0">7.0</option>
                        <option value="7.5">7.5</option>
                        <option value="8.0">8.0</option>
                    </select>
                </div>

                <div class="md:col-span-3 flex justify-around py-3 px-4 bg-slate-900/50 rounded border border-slate-800">
                    <div class="flex flex-col items-center"><input type="checkbox" id="check-ppn" checked onchange="calculateSolar()"><label class="text-[8px] mt-1 font-bold text-slate-500">PPN</label></div>
                    <div class="flex flex-col items-center"><input type="checkbox" id="check-pbbkb" checked onchange="calculateSolar()"><label class="text-[8px] mt-1 font-bold text-slate-500">PBBKB</label></div>
                    <div class="flex flex-col items-center"><input type="checkbox" id="check-pph" checked onchange="calculateSolar()"><label class="text-[8px] mt-1 font-bold text-slate-500">PPH</label></div>
                </div>

                <div class="md:col-span-3 text-right">
                    <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Franco Quote (IDR/Ltr)</p>
                    <div id="final-price" class="text-4xl font-black text-white mono tracking-tighter leading-none">Rp 0</div>
                </div>
            </div>
        </div>

        <button onclick="fetchAllData()" class="w-full md:w-auto px-8 py-3 bg-cyan-600 hover:bg-cyan-500 text-black font-black rounded text-[10px] uppercase tracking-[0.2em] transition-all active:scale-95 shadow-lg">
            Update Market Data Now
        </button>
    </div>

    <script>
        // MASUKKAN API KEY MARKETSTACK ANDA DI SINI
        const MARKETSTACK_KEY = 'YOUR_MARKETSTACK_API_KEY'; 
        const KURS_API = 'https://open.er-api.com/v6/latest/USD';

        window.marketData = { brent: 82.50, wti: 78.10 };
        window.kursIdr = 15850;

        async function fetchMarketStack() {
            try {
                // Catatan: Ticker di MarketStack untuk minyak biasanya menggunakan indeks komoditas
                // Contoh penggunaan: http://api.marketstack.com/v1/eod?access_key=KEY&symbols=BRENT,WTI
                const res = await fetch(`http://api.marketstack.com/v1/eod/latest?access_key=${MARKETSTACK_KEY}&symbols=XBRUSD,XTIUSD`);
                const data = await res.json();
                
                if (data && data.data) {
                    data.data.forEach(item => {
                        if(item.symbol === 'XBRUSD') window.marketData.brent = item.close;
                        if(item.symbol === 'XTIUSD') window.marketData.wti = item.close;
                    });
                }
            } catch (e) {
                console.log("MarketStack Error (Check HTTP/HTTPS or API Key)");
                // Tetap gunakan baseline jika error
                window.marketData.brent += (Math.random() - 0.5) * 0.1;
                window.marketData.wti += (Math.random() - 0.5) * 0.1;
            }
            updateUI();
        }

        async function fetchKurs() {
            try {
                const res = await fetch(KURS_API);
                const data = await res.json();
                window.kursIdr = data.rates.IDR;
                document.getElementById('kurs-top').innerText = Math.round(window.kursIdr).toLocaleString('id-ID');
                calculateSolar();
            } catch (e) { console.error("Kurs Error"); }
        }

        function updateUI() {
            document.getElementById('live-brent').innerText = window.marketData.brent.toFixed(2);
            document.getElementById('live-wti').innerText = window.marketData.wti.toFixed(2);
            syncFromMarket();
        }

        function syncFromMarket() {
            const mode = document.getElementById('market-sync').value;
            if (mode !== 'manual') {
                document.getElementById('input-mops').value = window.marketData[mode].toFixed(2);
                calculateSolar();
            }
        }

        function calculateSolar() {
            const baseVal = parseFloat(document.getElementById('input-mops').value) || 0;
            const alpha = parseFloat(document.getElementById('input-alpha').value) || 0;
            const kurs = window.kursIdr;
            
            // Rumus: ((Base + Alpha) / 158.98) * Kurs
            const priceLtrBase = ((baseVal + alpha) / 158.98) * kurs;
            
            let tax = 0;
            if (document.getElementById('check-ppn').checked) tax += 0.11;
            if (document.getElementById('check-pbbkb').checked) tax += 0.075;
            if (document.getElementById('check-pph').checked) tax += 0.003;
            
            const final = priceLtrBase + (priceLtrBase * tax);
            document.getElementById('final-price').innerText = "Rp " + Math.round(final).toLocaleString('id-ID');
        }

        function fetchAllData() {
            fetchKurs();
            fetchMarketStack();
            document.getElementById('current-time').innerText = new Date().toLocaleTimeString('en-GB');
        }

        // Jalankan
        fetchAllData();
        setInterval(fetchAllData, 600000); // Update otomatis setiap 10 menit
    </script>
</body>
</html>
