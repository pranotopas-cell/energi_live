<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSD TERMINAL MONITOR | KSE SYSTEM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
body{
background:#0a0e14;
color:white;
font-family:Arial;
}
</style>

</head>

<body class="p-4">

<h2 class="text-xl font-bold mb-4">CRUDE OIL MONITORING</h2>

<div class="grid grid-cols-2 md:grid-cols-3 gap-4">

<div class="bg-slate-900 p-4 rounded">
WTI
<div id="live-wti" class="text-xl text-blue-400">--</div>
</div>

<div class="bg-slate-900 p-4 rounded">
BRENT
<div id="live-brent" class="text-xl text-orange-400">--</div>
</div>

<div class="bg-slate-900 p-4 rounded">
MURBAN
<div id="live-murban" class="text-xl text-green-400">--</div>
</div>

<div class="bg-slate-900 p-4 rounded">
MOPS
<div id="live-mops" class="text-xl text-yellow-400">--</div>
</div>

<div class="bg-slate-900 p-4 rounded">
USD / IDR
<div id="kurs-top" class="text-xl text-white">--</div>
</div>

<div class="bg-slate-900 p-4 rounded">
HSD Estimate
<div id="final-price" class="text-xl text-cyan-400">--</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDenqfuE7Sjy773lp3k7WYh_3RRSr3nojM",
authDomain:"kse-harga-bbm-update.firebaseapp.com",
projectId:"kse-harga-bbm-update",
storageBucket:"kse-harga-bbm-update.firebasestorage.app",
messagingSenderId:"764165984284",
appId:"1:764165984284:web:a74aed43317539f5f1cfd9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"hargaBBM","periode");

onSnapshot(ref,(docSnap)=>{

if(docSnap.exists()){

console.log("Harga Pertamina update");

}

});

let marketData={
wti:0,
brent:0,
murban:0,
mops:0
}

let kursIdr=0

async function fetchOil(){

try{

const wti=await fetch("https://api.allorigins.win/raw?url=https://api.coincap.io/v2/assets/crude-oil")
const wtiData=await wti.json()

const brent=await fetch("https://api.allorigins.win/raw?url=https://api.coincap.io/v2/assets/brent-crude")
const brentData=await brent.json()

marketData.wti=parseFloat(wtiData.data.priceUsd)
marketData.brent=parseFloat(brentData.data.priceUsd)

marketData.murban=marketData.brent+1.2
marketData.mops=marketData.brent+48

document.getElementById("live-wti").innerText=marketData.wti.toFixed(2)
document.getElementById("live-brent").innerText=marketData.brent.toFixed(2)
document.getElementById("live-murban").innerText=marketData.murban.toFixed(2)
document.getElementById("live-mops").innerText=marketData.mops.toFixed(2)

calculateSolar()

}catch(e){

console.log("oil api delay")

}

}

async function fetchIDR(){

try{

const res=await fetch("https://open.er-api.com/v6/latest/USD")
const data=await res.json()

kursIdr=data.rates.IDR

document.getElementById("kurs-top").innerText=Math.round(kursIdr)

calculateSolar()

}catch(e){

console.log("fx api delay")

}

}

function calculateSolar(){

let mops=marketData.mops
let alpha=2.5

let base=((mops+alpha)/158.98)*kursIdr

let tax=0.11+0.075+0.003

let final=Math.round(base*(1+tax))

document.getElementById("final-price").innerText="Rp "+final.toLocaleString("id-ID")

}

fetchOil()
fetchIDR()

setInterval(fetchOil,60000)
setInterval(fetchIDR,60000)

</script>

</body>
</html>
