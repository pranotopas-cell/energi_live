<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crude Oil Monitoring</title>

<style>

body{
background:#050b1a;
font-family:Arial;
color:white;
margin:0;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title{
font-size:28px;
font-weight:bold;
}

.title span{
color:#00d4ff;
}

.time{
text-align:right;
color:#9ca3af;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#0f1b33;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.label{
color:#9ca3af;
font-size:13px;
margin-bottom:5px;
}

.value{
font-size:28px;
font-weight:bold;
}

.up{
color:#22c55e;
}

.down{
color:#ef4444;
}

.section{
margin-top:30px;
background:#0f1b33;
padding:20px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border-radius:6px;
border:none;
background:#081225;
color:white;
}

button{
width:100%;
padding:12px;
background:#00c853;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.result{
text-align:center;
font-size:26px;
margin-top:15px;
font-weight:bold;
color:#00e5ff;
}

</style>

</head>

<body>

<div class="header">

<div class="title">
CRUDE OIL <span>MONITORING</span><br>
<small style="color:#9ca3af;font-size:14px">
KHATULISTIWA SINAR ENERGI TERMINAL
</small>
</div>

<div class="time" id="clock">
--
</div>

</div>

<div class="grid">

<div class="card">
<div class="label">LIVE MOPS (SG)</div>
<div class="value" id="mops">139.02</div>
</div>

<div class="card">
<div class="label">WTI CRUDE OIL</div>
<div class="value up">93.56 ▲</div>
</div>

<div class="card">
<div class="label">BRENT CRUDE</div>
<div class="value down">90.14 ▼</div>
</div>

<div class="card">
<div class="label">MURBAN CRUDE</div>
<div class="value up">91.02 ▲</div>
</div>

<div class="card">
<div class="label">DXY INDEX</div>
<div class="value">103.85</div>
</div>

<div class="card">
<div class="label">USD / IDR</div>
<div class="value">16,938</div>
</div>

</div>

<div class="section">

<h3>MARKET REFERENCE</h3>

<label>Live SG Gasoil</label>
<input id="gasoil" value="812">

<label>Differential</label>
<input id="diff" value="25">

<button onclick="calcMops()">Hitung MOPS</button>

<div class="result" id="mopsResult">--</div>

</div>

<div class="section">

<h3>ALPHA PREMIUM</h3>

<input id="alpha" value="2.5">

</div>

<div class="section">

<h3>FRANCO QUOTE (RP/LTR)</h3>

<label>Kurs USD</label>
<input id="kurs" value="16900">

<button onclick="hitungHarga()">Hitung Harga</button>

<div class="result" id="harga">Rp -</div>

</div>

<script>

function updateClock(){

let now=new Date()

document.getElementById("clock").innerHTML=
now.toLocaleTimeString()+"<br>"+now.toDateString()

}

setInterval(updateClock,1000)

function calcMops(){

let gasoil=parseFloat(document.getElementById("gasoil").value)

let diff=parseFloat(document.getElementById("diff").value)

let mops=gasoil-diff

document.getElementById("mopsResult").innerText=
mops.toFixed(2)

window.mops=mops

}

function hitungHarga(){

let mops=window.mops||780

let kurs=parseFloat(document.getElementById("kurs").value)

let harga=(mops*kurs)/159

document.getElementById("harga").innerText=
"Rp "+Math.round(harga)

}

</script>

</body>
</html>
