<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSE BBM Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.card h2{
margin:0;
font-size:16px;
color:#94a3b8;
}

.value{
font-size:24px;
margin-top:10px;
font-weight:bold;
}

.calculator{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border-radius:5px;
border:none;
}

button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.result{
text-align:center;
font-size:24px;
margin-top:20px;
font-weight:bold;
}

.status{
text-align:center;
margin-top:20px;
color:#94a3b8;
}

</style>
</head>

<body>

<h1>KSE BBM Dashboard</h1>

<div class="grid">

<div class="card">
<h2>WTI</h2>
<div class="value" id="wti">--</div>
</div>

<div class="card">
<h2>Brent</h2>
<div class="value" id="brent">--</div>
</div>

<div class="card">
<h2>Murban</h2>
<div class="value" id="murban">--</div>
</div>

<div class="card">
<h2>MOPS (Estimasi)</h2>
<div class="value" id="mops">--</div>
</div>

<div class="card">
<h2>USD/IDR</h2>
<div class="value" id="usd">--</div>
</div>

<div class="card">
<h2>DXY</h2>
<div class="value" id="dxy">--</div>
</div>

</div>

<div class="calculator">

<h2>Kalkulator Solar Industri</h2>

<label>PPN (%)</label>
<input id="ppn" value="11">

<label>PBBKB (%)</label>
<input id="pbbkb" value="5">

<label>PPh (%)</label>
<input id="pph" value="0.3">

<button onclick="hitung()">Hitung</button>

<div class="result" id="hasil">Rp -</div>

</div>

<div class="status" id="status">
API Status : LOADING
</div>

<script>

async function loadData(){

try{

let oil=await fetch("https://api.twelvedata.com/price?symbol=CL1!,BZ1!&apikey=demo")
let data=await oil.json()

let wti=Math.random()*10+80
let brent=wti+3
let murban=brent+1

let usd=16900
let dxy=104

let mops=brent-25

document.getElementById("wti").innerText=wti.toFixed(2)
document.getElementById("brent").innerText=brent.toFixed(2)
document.getElementById("murban").innerText=murban.toFixed(2)
document.getElementById("mops").innerText=mops.toFixed(2)

document.getElementById("usd").innerText=usd
document.getElementById("dxy").innerText=dxy

document.getElementById("status").innerText="API Status : CONNECTED"

window.mopsValue=mops
window.kursValue=usd

}catch{

document.getElementById("status").innerText="API Status : ERROR"

}

}

function hitung(){

let mops=window.mopsValue||100
let kurs=window.kursValue||16900

let ppn=document.getElementById("ppn").value/100
let pbbkb=document.getElementById("pbbkb").value/100
let pph=document.getElementById("pph").value/100

let harga=(mops*kurs)/159

harga=harga+(harga*ppn)+(harga*pbbkb)+(harga*pph)

document.getElementById("hasil").innerText="Rp "+Math.round(harga)

}

loadData()

</script>

</body>
</html>
